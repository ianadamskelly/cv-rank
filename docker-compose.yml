services:
  cvrank:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_CV_BUILDER_URL: ${NEXT_PUBLIC_CV_BUILDER_URL}
      FLUTTERWAVE_PUBLIC_KEY: ${FLUTTERWAVE_PUBLIC_KEY}
      FLUTTERWAVE_SECRET_KEY: ${FLUTTERWAVE_SECRET_KEY}
      FLUTTERWAVE_SECRET_HASH: ${FLUTTERWAVE_SECRET_HASH}
      FLUTTERWAVE_WEBHOOK_SECRET: ${FLUTTERWAVE_WEBHOOK_SECRET}
      FLUTTERWAVE_BASE_URL: ${FLUTTERWAVE_BASE_URL}
      REPORT_PRICE_KES: ${REPORT_PRICE_KES}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      RESEND_REPLY_TO: ${RESEND_REPLY_TO}
    volumes:
      - cvrank_data:/app/.data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  cvrank_data:
